<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SENAMHI · UV Interactivo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

    :root {
      --bg-dark: #0f172a;
      --card-bg: #ffffff;
      --accent-very-high: #ef4444;
      --text-main: #1e293b;
      --footer-bg: #1e293b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-dark);
      background-image: radial-gradient(at 0% 0%, #1e293b 0, transparent 50%), radial-gradient(at 100% 100%, #0f172a 0, transparent 50%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      padding: 20px;
    }

    .dashboard {
      max-width: 440px;
      width: 100%;
      background: var(--card-bg);
      border-radius: 50px;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header { padding: 40px 40px 15px; display: flex; justify-content: space-between; align-items: center; }
    .brand h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #64748b; font-weight: 700; }
    .brand p { font-size: 26px; font-weight: 800; color: var(--text-main); }
    .date-badge { background: #f1f5f9; padding: 8px 16px; border-radius: 100px; font-size: 12px; font-weight: 700; color: #475569; }

    /* --- ANIMACIÓN CÍRCULO --- */
    .uv-section { text-align: center; padding: 10px 40px; }
    .uv-circle {
      width: 210px;
      height: 210px;
      margin: 0 auto;
      background: #fff;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      box-shadow: 0 15px 35px rgba(0,0,0,0.05);
    }

    /* El anillo que gira */
    .uv-circle::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: #fecaca;
      border-right-color: #fee2e2;
      animation: rotate 4s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .uv-number { font-size: 90px; font-weight: 900; color: var(--text-main); line-height: 1; z-index: 2; }

    /* --- ANIMACIÓN BOTÓN PULSANTE --- */
    .uv-status {
      background: var(--accent-very-high);
      color: white;
      padding: 6px 18px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 800;
      position: absolute;
      bottom: -10px;
      z-index: 3;
      animation: pulseGlow 2s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3); transform: scale(1); }
      50% { box-shadow: 0 12px 30px rgba(239, 68, 68, 0.6); transform: scale(1.05); }
    }

    .exposure-msg { margin-top: 35px; font-size: 14px; font-weight: 600; color: #64748b; }
    .exposure-msg b { color: var(--accent-very-high); }

    /* --- ANIMACIÓN ICONOS FLOTANTES --- */
    .protection-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 30px 40px; }
    .p-card { text-align: center; }
    .p-icon {
      width: 54px;
      height: 54px;
      background: #f8fafc;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin: 0 auto 8px;
      border: 1px solid #f1f5f9;
      animation: float 3s ease-in-out infinite;
    }

    .p-card:nth-child(even) .p-icon { animation-delay: 1.5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .p-card span { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }

    .alert-box { margin: 0 35px 25px; background: #fff1f2; padding: 16px; border-radius: 20px; display: flex; align-items: center; gap: 12px; border: 1px dashed #fda4af; }
    .alert-box p { font-size: 12px; font-weight: 700; color: #9f1239; }

    .forecast-container { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); padding: 30px 40px; border-radius: 40px 40px 0 0; }
    .forecast-grid { display: flex; justify-content: space-between; margin-bottom: 25px; }
    .f-day { text-align: center; }
    .f-name { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; }
    .f-val { font-size: 22px; font-weight: 800; color: #ffffff; }
    .f-dot { width: 14px; height: 4px; border-radius: 4px; margin: 8px auto 0; background: #ef4444; box-shadow: 0 0 8px rgba(239, 68, 68, 0.5); }

    .footer-source { text-align: center; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.08); }
    .source-text { font-size: 9px; color: #64748b; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
  </style>
</head>
<body>
<div class="dashboard">
  <div class="header">
    <div class="brand"><h2>Senamhi Perú</h2><p>Índice UV</p></div>
    <div class="date-badge">LUN 20 ABRIL</div>
  </div>
  <div class="uv-section">
    <div class="uv-circle">
      <span style="font-size: 11px; font-weight: 700; color: #cbd5e1; letter-spacing: 1px;">ACTUAL</span>
      <div class="uv-number">10</div>
      <div class="uv-status">MUY ALTO</div>
    </div>
    <p class="exposure-msg">Exposición recomendada: <b>Máx 15 min</b></p>
  </div>
  <div class="protection-grid">
    <div class="p-card"><div class="p-icon">🧴</div><span>FPS 50+</span></div>
    <div class="p-card"><div class="p-icon">🕶️</div><span>Lentes</span></div>
    <div class="p-card"><div class="p-icon">🧢</div><span>Gorro</span></div>
    <div class="p-card"><div class="p-icon">👕</div><span>Manga Larga</span></div>
    <div class="p-card"><div class="p-icon">⛱️</div><span>Sombra</span></div>
    <div class="p-card"><div class="p-icon">💧</div><span>Hidratación</span></div>
  </div>
  <div class="alert-box">
    <span style="font-size: 20px;">🚫</span>
    <p>Evitar exposición directa entre las <br><b>11:00 AM</b> y las <b>3:00 PM</b></p>
  </div>
  <div class="forecast-container">
    <div class="forecast-grid">
      <div class="f-day"><div class="f-name">Mar 21</div><div class="f-val">10</div><div class="f-dot"></div></div>
      <div class="f-day"><div class="f-name">Mié 22</div><div class="f-val">9</div><div class="f-dot"></div></div>
      <div class="f-day"><div class="f-name">Jue 23</div><div class="f-val">8</div><div class="f-dot"></div></div>
      <div class="f-day"><div class="f-name">Vie 24</div><div class="f-val">9</div><div class="f-dot"></div></div>
    </div>
    <div class="footer-source"><div class="source-text">Fuente: Dirección Zonal 6</div></div>
  </div>
</div>
</body>
</html>
